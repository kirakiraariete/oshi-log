<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>推しログ RANKING</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --main: #C4704A; --bg: #F8F5F2; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: #3D2B1F; margin: 0; }
        .serif { font-family: 'Noto Serif JP', serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .card { transition: all 0.2s; border: 1px solid rgba(196, 112, 74, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [animes, setAnimes] = useState(() => {
                const saved = localStorage.getItem('oshi-log-ultimate');
                return saved ? JSON.parse(saved) : [];
            });
            const [page, setPage] = useState('home'); 
            const [selectedId, setSelectedId] = useState(null);
            const [editingItem, setEditingItem] = useState(null);
            const [tempImg, setTempImg] = useState("");
            const [activeCategory, setActiveCategory] = useState("すべて");

            useEffect(() => {
                localStorage.setItem('oshi-log-ultimate', JSON.stringify(animes));
            }, [animes]);

            const handleImage = (e, callback) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => callback(reader.result);
                reader.readAsDataURL(file);
            };

            // アニメ保存
            const saveAnime = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const data = {
                    title: fd.get('title'),
                    memo: fd.get('memo'),
                    cat: fd.get('cat') || "未設定",
                    image: tempImg || (editingItem?.image || "")
                };
                if (editingItem) {
                    setAnimes(animes.map(a => a.id === editingItem.id ? { ...a, ...data } : a));
                } else {
                    setAnimes([{ id: Date.now(), ...data, charas: [] }, ...animes]);
                }
                setPage('home'); setEditingItem(null); setTempImg("");
            };

            // キャラ保存
            const saveChara = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const charaData = {
                    id: editingItem ? editingItem.id : Date.now(),
                    name: fd.get('name'),
                    trait: fd.get('trait'),
                    tag: fd.get('tag') || "未設定",
                    image: tempImg || (editingItem?.image || "")
                };
                setAnimes(animes.map(a => {
                    if (a.id === selectedId) {
                        const newCharas = editingItem 
                            ? a.charas.map(c => c.id === editingItem.id ? charaData : c)
                            : [...a.charas, charaData];
                        return { ...a, charas: newCharas };
                    }
                    return a;
                }));
                setEditingItem(null); setTempImg(""); e.target.reset();
            };

            // 順序変更
            const move = (list, index, dir) => {
                const newList = [...list];
                const target = index + dir;
                if (target < 0 || target >= newList.length) return list;
                [newList[index], newList[target]] = [newList[target], newList[index]];
                return newList;
            };

            const animeCats = ["すべて", ...new Set(animes.map(a => a.cat))];
            const displayAnimes = activeCategory === "すべて" ? animes : animes.filter(a => a.cat === activeCategory);
            const allCharas = animes.flatMap(a => a.charas.map(c => ({ ...c, animeTitle: a.title, animeId: a.id })));
            const charaCats = ["すべて", ...new Set(allCharas.map(c => c.tag))];

            return (
                <div className="min-h-screen pb-24">
                    {/* Header */}
                    <header className="glass sticky top-0 z-30 p-4 border-b border-orange-100 flex justify-between items-center">
                        <h1 className="serif text-xl text-[#C4704A]" onClick={() => setPage('home')}>推しログ</h1>
                        <div className="flex gap-2">
                            <button onClick={() => setPage('charas')} className="text-xs bg-white border border-orange-200 px-3 py-2 rounded-full">👤 キャラまとめ</button>
                            <button onClick={() => {setEditingItem(null); setPage('add');}} className="text-xs bg-[#C4704A] text-white px-3 py-2 rounded-full">＋ 作品追加</button>
                        </div>
                    </header>

                    {/* Anime Page */}
                    {page === 'home' && (
                        <div className="p-4 animate-in fade-in">
                            <div className="flex gap-2 overflow-x-auto pb-4 mb-2">
                                {animeCats.map(c => (
                                    <button key={c} onClick={() => setActiveCategory(c)} className={`px-4 py-1 rounded-full text-xs whitespace-nowrap ${activeCategory === c ? 'bg-[#C4704A] text-white' : 'bg-white text-gray-500'}`}>{c}</button>
                                ))}
                            </div>
                            <div className="grid gap-4">
                                {displayAnimes.map((a, i) => (
                                    <div key={a.id} className="bg-white rounded-2xl overflow-hidden card relative">
                                        <div className="absolute top-2 left-2 bg-black/50 text-white text-[10px] px-2 py-1 rounded-lg z-10 serif">RANK {i+1}</div>
                                        <div onClick={() => { setSelectedId(a.id); setPage('detail'); }}>
                                            {a.image && <img src={a.image} className="w-full h-40 object-cover" />}
                                            <div className="p-4">
                                                <div className="text-[10px] text-[#C4704A] font-bold mb-1">#{a.cat}</div>
                                                <h2 className="serif text-lg leading-tight">{a.title}</h2>
                                            </div>
                                        </div>
                                        <div className="absolute top-2 right-2 flex gap-1">
                                            <button onClick={() => {setAnimes(move(animes, i, -1))}} className="bg-white/90 p-2 rounded-full shadow text-[10px]">▲</button>
                                            <button onClick={() => {setAnimes(move(animes, i, 1))}} className="bg-white/90 p-2 rounded-full shadow text-[10px]">▼</button>
                                            <button onClick={() => {setEditingItem(a); setTempImg(a.image); setPage('add');}} className="bg-white/90 p-2 rounded-full shadow text-[10px]">編集</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Character Analysis Page */}
                    {page === 'charas' && (
                        <div className="p-4 animate-in slide-in-from-right">
                            <h2 className="serif text-xl mb-4">キャラ分析・まとめ</h2>
                            <div className="flex gap-2 overflow-x-auto pb-4 mb-4">
                                {charaCats.map(c => (
                                    <button key={c} onClick={() => setActiveCategory(c)} className={`px-4 py-1 rounded-full text-xs ${activeCategory === c ? 'bg-[#C4704A] text-white' : 'bg-white'}`}>{c}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                {(activeCategory === "すべて" ? allCharas : allCharas.filter(c => c.tag === activeCategory)).map(c => (
                                    <div key={c.id} className="bg-white p-3 rounded-2xl card text-center">
                                        <div className="w-16 h-16 mx-auto rounded-full overflow-hidden mb-2 border-2 border-orange-50">
                                            {c.image ? <img src={c.image} className="w-full h-full object-cover" /> : "👤"}
                                        </div>
                                        <div className="text-[9px] text-[#C4704A] font-bold">{c.tag}</div>
                                        <div className="font-bold text-sm truncate">{c.name}</div>
                                        <div className="text-[8px] text-gray-400 truncate">{c.animeTitle}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Detail Page */}
                    {page === 'detail' && selectedId && (
                        <div className="p-4 animate-in fade-in">
                            <button onClick={() => setPage('home')} className="mb-4 text-sm text-gray-400">← 戻る</button>
                            {animes.filter(a => a.id === selectedId).map(a => (
                                <div key={a.id}>
                                    <h2 className="serif text-2xl mb-6">{a.title}の推しキャラ</h2>
                                    <div className="grid gap-4">
                                        {a.charas.map((c, ci) => (
                                            <div key={c.id} className="bg-white p-3 rounded-2xl flex gap-4 items-center card relative">
                                                <div className="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0">
                                                    {c.image ? <img src={c.image} className="w-full h-full object-cover" /> : "👤"}
                                                </div>
                                                <div className="flex-1">
                                                    <div className="text-[10px] text-[#C4704A] font-bold">RANK {ci+1} / {c.tag}</div>
                                                    <div className="font-bold">{c.name}</div>
                                                    <div className="text-xs text-gray-400">{c.trait}</div>
                                                </div>
                                                <div className="flex flex-col gap-2">
                                                    <button onClick={() => {
                                                        const ncs = move(a.charas, ci, -1);
                                                        setAnimes(animes.map(an => an.id === a.id ? {...an, charas: ncs} : an));
                                                    }} className="text-[10px] text-gray-300">▲</button>
                                                    <button onClick={() => {
                                                        const ncs = move(a.charas, ci, 1);
                                                        setAnimes(animes.map(an => an.id === a.id ? {...an, charas: ncs} : an));
                                                    }} className="text-[10px] text-gray-300">▼</button>
                                                </div>
                                                <button onClick={() => {
                                                    if(confirm("削除しますか？")) {
                                                        setAnimes(animes.map(an => an.id === a.id ? {...an, charas: an.charas.filter(cc => cc.id !== c.id)} : an));
                                                    }
                                                }} className="absolute top-2 right-2 text-[10px] text-red-200">×</button>
                                            </div>
                                        ))}
                                    </div>
                                    {/* Add Chara Form */}
                                    <form onSubmit={saveChara} className="mt-8 bg-white/50 border-2 border-dashed border-orange-100 p-4 rounded-2xl">
                                        <input name="name" required placeholder="キャラ名" className="w-full bg-transparent border-b border-orange-100 p-2 text-sm mb-2 outline-none" />
                                        <input name="tag" placeholder="カテゴリー（例：癒やし、クール）" className="w-full bg-transparent border-b border-orange-100 p-2 text-sm mb-2 outline-none" />
                                        <textarea name="trait" placeholder="分析・好きポイント" className="w-full bg-transparent border-b border-orange-100 p-2 text-sm mb-4 outline-none" />
                                        <div className="flex justify-between items-center">
                                            <input type="file" accept="image/*" onChange={e => handleImage(e, setTempImg)} className="text-[10px] w-2/3" />
                                            <button className="bg-[#7A8C6E] text-white px-4 py-2 rounded-full text-xs font-bold">追加</button>
                                        </div>
                                    </form>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Add/Edit Anime Form */}
                    {page === 'add' && (
                        <div className="p-6 bg-white min-h-screen animate-in slide-in-from-bottom">
                            <h2 className="serif text-xl mb-6 text-center">{editingItem ? "作品を編集" : "新しい作品"}</h2>
                            <form onSubmit={saveAnime} className="grid gap-6">
                                <input name="title" defaultValue={editingItem?.title} required placeholder="作品名" className="text-xl border-b-2 p-2 outline-none focus:border-[#C4704A]" />
                                <input name="cat" defaultValue={editingItem?.cat} placeholder="カテゴリー（例：殿堂入り、2024春）" className="border-b p-2 text-sm outline-none" />
                                <textarea name="memo" defaultValue={editingItem?.memo} placeholder="感想・メモ" className="border rounded-xl p-3 h-32 text-sm outline-none" />
                                <div className="text-center bg-[#FDFBF9] p-4 rounded-2xl border">
                                    <input type="file" accept="image/*" onChange={e => handleImage(e, setTempImg)} className="text-xs" />
                                    {tempImg && <img src={tempImg} className="mt-4 w-full h-40 object-cover rounded-xl shadow" />}
                                </div>
                                <button className="bg-[#C4704A] text-white py-4 rounded-2xl font-bold shadow-lg">保存する</button>
                                {editingItem && <button type="button" onClick={() => {if(confirm("削除しますか？")){setAnimes(animes.filter(a=>a.id!==editingItem.id)); setPage('home');}}} className="text-red-400 text-sm">この作品を削除する</button>}
                            </form>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
