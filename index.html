<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>推しログ Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #FDFBFA; color: #4A3B33; margin: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-area { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const STORAGE_KEY = 'oshi-log-v10';
            const [animes, setAnimes] = useState(() => {
                try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
            });
            const [view, setView] = useState('home');
            const [selId, setSelId] = useState(null);
            const [editItem, setEditItem] = useState(null);
            const [editChara, setEditChara] = useState(null);
            const [tempImg, setTempImg] = useState("");
            const [activeCat, setActiveCat] = useState("すべて");
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(animes)); } catch (e) {
                    alert("容量制限です。不要な画像を削除してください。");
                }
            }, [animes]);

            // 画質向上: 640px / 80%品質
            const compress = (file) => new Promise((res) => {
                const r = new FileReader();
                r.readAsDataURL(file);
                r.onload = (e) => {
                    const i = new Image();
                    i.src = e.target.result;
                    i.onload = () => {
                        const c = document.createElement('canvas');
                        const w = Math.min(i.width, 640);
                        const h = i.height * (w / i.width);
                        c.width = w; c.height = h;
                        const ctx = c.getContext('2d');
                        ctx.drawImage(i, 0, 0, w, h);
                        res(c.toDataURL('image/jpeg', 0.8));
                    };
                };
            });

            const onFile = async (e) => {
                if (!e.target.files[0]) return;
                setLoading(true);
                setTempImg(await compress(e.target.files[0]));
                setLoading(false);
            };

            const reset = () => { setView('home'); setEditItem(null); setEditChara(null); setSelId(null); setTempImg(""); };

            const onSaveAnime = (e) => {
                e.preventDefault();
                const d = new FormData(e.target);
                const obj = {
                    id: editItem ? editItem.id : Date.now(),
                    title: d.get('t'), memo: d.get('m'), cat: d.get('c'),
                    img: tempImg || (editItem ? editItem.img : ""),
                    charas: editItem ? (editItem.charas || []) : []
                };
                if (editItem) setAnimes(animes.map(a => a.id === editItem.id ? obj : a));
                else setAnimes([obj, ...animes]);
                reset();
            };

            const onSaveChara = (e) => {
                e.preventDefault();
                const d = new FormData(e.target);
                const obj = {
                    id: editChara ? editChara.id : Date.now(),
                    name: d.get('n'), tag: d.get('g'),
                    img: tempImg || (editChara ? editChara.img : "")
                };
                setAnimes(animes.map(a => {
                    if (a.id !== selId) return a;
                    const ncs = editChara 
                        ? (a.charas || []).map(c => c.id === editChara.id ? obj : c)
                        : [...(a.charas || []), obj];
                    return { ...a, charas: ncs };
                }));
                setEditChara(null); setTempImg(""); e.target.reset();
            };

            const move = (list, i, d) => {
                const n = [...list];
                if (i+d < 0 || i+d >= n.length) return list;
                [n[i], n[i+d]] = [n[i+d], n[i]];
                return n;
            };

            const currentAnime = animes.find(a => a.id === selId);
            const cats = ["すべて", ...new Set(animes.map(a => a.cat))];

            return (
                <div className="safe-area">
                    <header className="bg-white/95 backdrop-blur p-4 sticky top-0 z-50 flex justify-between items-center border-b">
                        <h1 className="font-bold text-orange-900 text-lg" onClick={reset}>推しログ</h1>
                        <div className="flex gap-2">
                            <button onClick={() => setView('cs')} className="text-[10px] bg-orange-50 px-3 py-2 rounded-full">👤 全キャラ</button>
                            <button onClick={() => {reset(); setView('add');}} className="text-[10px] bg-orange-700 text-white px-4 py-2 rounded-full font-bold">＋ 追加</button>
                        </div>
                    </header>

                    <main className="p-4 max-w-lg mx-auto">
                        {view === 'home' && (
                            <div>
                                <div className="flex gap-2 overflow-x-auto mb-6 no-scrollbar">
                                    {cats.map(c => <button key={c} onClick={() => setActiveCat(c)} className={`px-4 py-1.5 rounded-full text-xs transition-colors ${activeCat === c ? 'bg-orange-800 text-white' : 'bg-white text-gray-400 border'}`}>{c}</button>)}
                                </div>
                                <div className="grid gap-6">
                                    {(activeCat === "すべて" ? animes : animes.filter(a => a.cat === activeCat)).map((a, i) => (
                                        <div key={a.id} className="card relative overflow-hidden">
                                            <div onClick={() => { setSelId(a.id); setView('det'); }}>
                                                {a.img && <img src={a.img} className="w-full h-56 object-cover" />}
                                                <div className="p-4">
                                                    <div className="flex justify-between items-center text-[10px] font-bold text-orange-700 mb-1">
                                                        <span>RANK {i+1} / {a.cat}</span>
                                                        <span>{(a.charas||[]).length} items</span>
                                                    </div>
                                                    <h2 className="font-bold text-xl">{a.title}</h2>
                                                </div>
                                            </div>
                                            <div className="absolute top-2 right-2 flex gap-1">
                                                <button onClick={() => setAnimes(move(animes, i, -1))} className="bg-white/90 w-8 h-8 rounded-full shadow text-xs flex items-center justify-center">▲</button>
                                                <button onClick={() => setAnimes(move(animes, i, 1))} className="bg-white/90 w-8 h-8 rounded-full shadow text-xs flex items-center justify-center">▼</button>
                                                <button onClick={() => {setEditItem(a); setTempImg(a.img); setView('add');}} className="bg-orange-700 text-white w-8 h-8 rounded-full shadow text-xs flex items-center justify-center ml-1">✎</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'det' && currentAnime && (
                            <div>
                                <button onClick={reset} className="text-xs text-orange-300 mb-4">← もどる</button>
                                <div className="card p-6 mb-8 border-l-4 border-orange-700">
                                    <h2 className="font-bold text-2xl mb-2">{currentAnime.title}</h2>
                                    <p className="text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">{currentAnime.memo}</p>
                                </div>
                                <h3 className="font-bold mb-4 text-sm flex items-center gap-2">🏆 推しランキング</h3>
                                <div className="grid gap-3">
                                    {(currentAnime.charas || []).map((c, ci) => (
                                        <div key={c.id} className="card p-3 flex gap-4 items-center relative">
                                            <div className="w-16 h-16 rounded-xl overflow-hidden bg-gray-50 flex-shrink-0">
                                                {c.img ? <img src={c.img} className="w-full h-full object-cover" /> : <div className="h-full flex items-center justify-center">👤</div>}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="text-[9px] font-bold text-orange-700">#{ci+1} / {c.tag}</div>
                                                <div className="font-bold truncate">{c.name}</div>
                                            </div>
                                            <div className="flex gap-2 mr-6">
                                                <button onClick={() => {const nc = move(currentAnime.charas, ci, -1); setAnimes(animes.map(an => an.id === currentAnime.id ? {...an, charas: nc} : an))}} className="text-gray-300">▲</button>
                                                <button onClick={() => {const nc = move(currentAnime.charas, ci, 1); setAnimes(animes.map(an => an.id === currentAnime.id ? {...an, charas: nc} : an))}} className="text-gray-300">▼</button>
                                            </div>
                                            <button onClick={() => {setEditChara(c); setTempImg(c.img);}} className="absolute top-1 right-8 text-blue-300 text-xs p-2">✎</button>
                                            <button onClick={() => {if(confirm("削除しますか？")) setAnimes(animes.map(an => an.id === currentAnime.id ? {...an, charas: an.charas.filter(cc => cc.id !== c.id)} : an))} } className="absolute top-1 right-2 text-red-200 text-xs p-2">×</button>
                                        </div>
                                    ))}
                                </div>
                                <form onSubmit={onSaveChara} className="mt-8 card p-6 border-2 border-dashed border-orange-100 shadow-none">
                                    <p className="text-xs font-bold text-center mb-4 text-orange-800">{editChara ? "キャラを編集" : "キャラを追加"}</p>
                                    <input name="n" defaultValue={editChara?.name} required placeholder="キャラ名" className="w-full mb-2 p-3 bg-gray-50 rounded-xl outline-none text-sm" />
                                    <input name="g" defaultValue={editChara?.tag} placeholder="特徴（癒やし系、など）" className="w-full mb-4 p-3 bg-gray-50 rounded-xl outline-none text-sm" />
                                    <div className="flex justify-between items-center gap-2">
                                        <input type="file" onChange={onFile} className="text-[10px] w-2/3" />
                                        <button disabled={loading} className="bg-orange-800 text-white px-6 py-2 rounded-xl text-xs font-bold">
                                            {loading ? "..." : (editChara ? "更新" : "追加")}
                                        </button>
                                    </div>
                                    {tempImg && <div className="mt-4 relative inline-block"><img src={tempImg} className="w-20 h-20 object-cover rounded-xl shadow" /><button onClick={()=>setTempImg("")} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-[10px]">×</button></div>}
                                    {editChara && <button type="button" onClick={()=>{setEditChara(null); setTempImg("");}} className="block w-full text-center text-[10px] text-gray-400 mt-4 underline">キャンセル</button>}
                                </form>
                            </div>
                        )}

                        {(view === 'add') && (
                            <div className="card p-6">
                                <h2 className="font-bold text-xl mb-8 text-center">{editItem ? "作品を編集" : "作品を登録"}</h2>
                                <form onSubmit={onSaveAnime} className="grid gap-5">
                                    <div><label className="text-[10px] font-bold text-gray-400">タイトル</label><input name="t" defaultValue={editItem?.title} required className="w-full p-3 bg-gray-50 rounded-xl outline-none font-bold" /></div>
                                    <div><label className="text-[10px] font-bold text-gray-400">カテゴリー</label><input name="c" defaultValue={editItem?.cat} placeholder="殿堂入り、視聴中など" className="w-full p-3 bg-gray-50 rounded-xl outline-none text-sm" /></div>
                                    <div><label className="text-[10px] font-bold text-gray-400">感想メモ</label><textarea name="m" defaultValue={editItem?.memo} className="w-full p-3 bg-gray-50 rounded-xl h-32 outline-none text-sm" /></div>
                                    <div className="bg-orange-50/50 p-6 rounded-2xl text-center border-2 border-dashed border-orange-100">
                                        <input type="file" onChange={onFile} className="text-xs w-full" />
                                        {tempImg && <div className="mt-4 relative"><img src={tempImg} className="w-full h-48 object-cover rounded-xl" /><button type="button" onClick={() => setTempImg("")} className="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs">×</button></div>}
                                    </div>
                                    <button disabled={loading} className="bg-orange-700 text-white py-4 rounded-2xl font-bold shadow-lg">
                                        {loading ? "処理中..." : (editItem ? "変更を保存" : "作品を登録")}
                                    </button>
                                    {editItem && <button type="button" onClick={() => {if(confirm("削除しますか？")){setAnimes(animes.filter(a=>a.id!==editItem.id)); reset();}}} className="text-red-300 text-xs mt-2 underline">完全に削除する</button>}
                                </form>
                            </div>
                        )}

                        {view === 'cs' && (
                            <div className="grid grid-cols-2 gap-3">
                                {animes.flatMap(a => (a.charas || []).map(c => ({...c, aT: a.title, aI: a.id}))).map(c => (
                                    <div key={c.id} className="card p-4 text-center" onClick={() => {setSelId(c.aI); setView('det');}}>
                                        <div className="w-20 h-20 mx-auto rounded-full overflow-hidden mb-3 border-2 border-orange-50">{c.img ? <img src={c.img} className="w-full h-full object-cover" /> : <div className="h-full bg-orange-50 flex items-center justify-center text-xl">👤</div>}</div>
                                        <div className="text-[9px] font-bold text-orange-600 mb-1">{c.tag}</div>
                                        <div className="font-bold text-sm truncate">{c.name}</div>
                                        <div className="text-[9px] text-gray-400 truncate mt-1">{c.aT}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
