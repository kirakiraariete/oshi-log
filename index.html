<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>推しログ Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --beige: #F5EFE6; --terra: #C4704A; --text-dark: #3D2B1F; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--beige); color: var(--text-dark); margin: 0; }
        .serif { font-family: 'Noto Serif JP', serif; }
        .card-shadow { box-shadow: 0 4px 20px rgba(107, 79, 58, 0.12); }
        .tab-active { border-bottom: 2px solid var(--terra); color: var(--terra); font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [animes, setAnimes] = useState(() => {
                const saved = localStorage.getItem('oshi-log-v3');
                return saved ? JSON.parse(saved) : [];
            });
            const [view, setView] = useState('home');
            const [editingItem, setEditingItem] = useState(null);
            const [selectedId, setSelectedId] = useState(null);
            const [tempImg, setTempImg] = useState("");
            const [currentCategory, setCurrentCategory] = useState("すべて");

            const categories = ["すべて", "殿堂入り", "視聴中", "これから"];

            useEffect(() => {
                localStorage.setItem('oshi-log-v3', JSON.stringify(animes));
            }, [animes]);

            const handleImage = (e, callback) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => callback(reader.result);
                reader.readAsDataURL(file);
            };

            // 作品の追加・更新
            const saveAnime = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = {
                    title: formData.get('title'),
                    memo: formData.get('memo'),
                    category: formData.get('category'),
                    image: tempImg || (editingItem ? editingItem.image : "")
                };

                if (editingItem) {
                    setAnimes(animes.map(a => a.id === editingItem.id ? { ...a, ...data } : a));
                } else {
                    setAnimes([{ id: Date.now(), ...data, charas: [] }, ...animes]);
                }
                setEditingItem(null); setTempImg(""); setView('home');
            };

            // キャラ追加・更新
            const saveChara = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const charaData = {
                    id: editingItem ? editingItem.id : Date.now(),
                    name: formData.get('name'),
                    trait: formData.get('trait'),
                    charaCat: formData.get('charaCat'),
                    image: tempImg || (editingItem ? editingItem.image : "")
                };

                const newAnimes = animes.map(a => {
                    if (a.id === selectedId) {
                        let newCharas;
                        if (editingItem) {
                            newCharas = a.charas.map(c => c.id === editingItem.id ? charaData : c);
                        } else {
                            newCharas = [...a.charas, charaData];
                        }
                        return { ...a, charas: newCharas };
                    }
                    return a;
                });
                setAnimes(newAnimes); setEditingItem(null); setTempImg(""); e.target.reset();
            };

            const deleteAnime = (id) => { if(confirm("作品を削除しますか？")) setAnimes(animes.filter(a => a.id !== id)); };
            const deleteChara = (animeId, charaId) => {
                if(confirm("キャラを削除しますか？")) {
                    setAnimes(animes.map(a => a.id === animeId ? { ...a, charas: a.charas.filter(c => c.id !== charaId) } : a));
                }
            };

            const moveChara = (animeId, charaId, direction) => {
                setAnimes(animes.map(a => {
                    if (a.id === animeId) {
                        const idx = a.charas.findIndex(c => c.id === charaId);
                        const newCharas = [...a.charas];
                        const targetIdx = idx + direction;
                        if (targetIdx >= 0 && targetIdx < newCharas.length) {
                            [newCharas[idx], newCharas[targetIdx]] = [newCharas[targetIdx], newCharas[idx]];
                        }
                        return { ...a, charas: newCharas };
                    }
                    return a;
                }));
            };

            const selectedAnime = animes.find(a => a.id === selectedId);
            const filteredAnimes = currentCategory === "すべて" ? animes : animes.filter(a => a.category === currentCategory);

            return (
                <div className="min-h-screen pb-24">
                    <header className="bg-white p-4 shadow-sm sticky top-0 z-20 flex justify-between items-center">
                        <h1 className="serif text-xl font-bold text-[#C4704A]" onClick={() => {setView('home'); setEditingItem(null);}}>推し<span>ログ</span></h1>
                        {view === 'home' && <button onClick={() => {setEditingItem(null); setView('add');}} className="bg-[#C4704A] text-white px-4 py-2 rounded-full text-xs">＋ 作品追加</button>}
                        {view !== 'home' && <button onClick={() => {setView('home'); setEditingItem(null);}} className="text-gray-400 text-sm">戻る</button>}
                    </header>

                    {view === 'home' && (
                        <div className="flex bg-white overflow-x-auto whitespace-nowrap px-4 border-b">
                            {categories.map(cat => (
                                <button key={cat} onClick={() => setCurrentCategory(cat)} className={`px-4 py-3 text-xs ${currentCategory === cat ? 'tab-active' : 'text-gray-400'}`}>{cat}</button>
                            ))}
                        </div>
                    )}

                    <main className="p-4 max-w-2xl mx-auto">
                        {view === 'home' && (
                            <div className="grid gap-6">
                                {filteredAnimes.map((anime) => (
                                    <div key={anime.id} className="bg-white rounded-3xl overflow-hidden card-shadow relative">
                                        <div onClick={() => { setSelectedId(anime.id); setView('detail'); }}>
                                            {anime.image && <img src={anime.image} className="w-full h-48 object-cover" />}
                                            <div className="p-5">
                                                <span className="text-[10px] bg-[#F5EFE6] text-[#C4704A] px-2 py-1 rounded-md font-bold">{anime.category || "未設定"}</span>
                                                <h2 className="serif text-lg font-bold mt-2">{anime.title}</h2>
                                            </div>
                                        </div>
                                        <div className="absolute top-2 right-2 flex gap-2">
                                            <button onClick={() => {setEditingItem(anime); setTempImg(anime.image); setView('add');}} className="bg-white/80 p-2 rounded-full text-xs">編集</button>
                                            <button onClick={() => deleteAnime(anime.id)} className="bg-white/80 p-2 rounded-full text-xs text-red-500">消去</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'detail' && selectedAnime && (
                            <div>
                                <div className="bg-white rounded-3xl overflow-hidden card-shadow mb-6">
                                    {selectedAnime.image && <img src={selectedAnime.image} className="w-full h-64 object-cover" />}
                                    <div className="p-6">
                                        <h2 className="serif text-2xl font-bold">{selectedAnime.title}</h2>
                                        <p className="text-sm text-gray-500 mt-4 whitespace-pre-wrap">{selectedAnime.memo}</p>
                                    </div>
                                </div>

                                <h3 className="serif text-lg font-bold mb-4">推しキャラ一覧</h3>
                                <div className="grid gap-4">
                                    {selectedAnime.charas.map((c, idx) => (
                                        <div key={c.id} className="bg-white p-3 rounded-2xl flex gap-4 items-center card-shadow relative">
                                            <div className="w-20 h-20 rounded-xl bg-gray-100 overflow-hidden flex-shrink-0">
                                                {c.image ? <img src={c.image} className="w-full h-full object-cover" /> : <div className="flex items-center justify-center h-full">👤</div>}
                                            </div>
                                            <div className="flex-1">
                                                <div className="text-[10px] text-[#C4704A] font-bold">{c.charaCat || "まとめなし"} #{idx+1}</div>
                                                <div className="font-bold text-base">{c.name}</div>
                                                <div className="text-xs text-gray-400 mt-1">{c.trait}</div>
                                                <div className="flex gap-4 mt-2">
                                                    <button onClick={() => moveChara(selectedAnime.id, c.id, -1)} className="text-xs text-gray-300">▲</button>
                                                    <button onClick={() => moveChara(selectedAnime.id, c.id, 1)} className="text-xs text-gray-300">▼</button>
                                                    <button onClick={() => {setEditingItem(c); setTempImg(c.image);}} className="text-xs text-blue-400">編集</button>
                                                    <button onClick={() => deleteChara(selectedAnime.id, c.id)} className="text-xs text-red-300">削除</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}

                                    <form onSubmit={saveChara} className="bg-white p-6 rounded-2xl border-2 border-dashed border-[#EDE3D5]">
                                        <p className="text-xs font-bold text-[#C4704A] mb-4 text-center serif">{editingItem ? "キャラを編集" : "新しく推しを登録"}</p>
                                        <input name="name" defaultValue={editingItem?.name || ""} required placeholder="キャラ名" className="w-full border-b p-2 text-sm mb-3 outline-none" />
                                        <input name="trait" defaultValue={editingItem?.trait || ""} placeholder="特徴・ランキング理由など" className="w-full border-b p-2 text-sm mb-3 outline-none" />
                                        <input name="charaCat" defaultValue={editingItem?.charaCat || ""} placeholder="カテゴリー（例：癒やし枠、美形）" className="w-full border-b p-2 text-sm mb-4 outline-none" />
                                        <div className="flex items-center justify-between">
                                            <input type="file" accept="image/*" onChange={(e) => handleImage(e, setTempImg)} className="text-[10px]" />
                                            <button type="submit" className="bg-[#7A8C6E] text-white px-6 py-2 rounded-full text-xs">{editingItem ? "更新" : "キャラ追加"}</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {view === 'add' && (
                            <form onSubmit={saveAnime} className="bg-white p-8 rounded-3xl card-shadow">
                                <h2 className="serif text-xl font-bold mb-6 text-center">{editingItem ? "作品を編集" : "作品を追加"}</h2>
                                <div className="grid gap-6">
                                    <input name="title" defaultValue={editingItem?.title || ""} required className="w-full border-b-2 p-2 outline-none text-lg" placeholder="作品名" />
                                    <select name="category" defaultValue={editingItem?.category || "すべて"} className="w-full border-b p-2 text-sm outline-none">
                                        {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <textarea name="memo" defaultValue={editingItem?.memo || ""} className="w-full border-2 p-3 rounded-xl text-sm h-32 outline-none" placeholder="作品の感想..." />
                                    <div className="bg-[#FDFAF6] p-4 rounded-2xl text-center">
                                        <input type="file" accept="image/*" onChange={(e) => handleImage(e, setTempImg)} className="text-xs" />
                                        {tempImg && <img src={tempImg} className="mt-4 w-full h-40 object-cover rounded-xl" />}
                                    </div>
                                    <button type="submit" className="bg-[#C4704A] text-white py-4 rounded-2xl font-bold">{editingItem ? "更新する" : "保存する"}</button>
                                </div>
                            </form>
                        )}
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
