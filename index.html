<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>推しログ Stable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8F5F2; color: #3D2B1F; margin: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .safe-area { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [animes, setAnimes] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('oshi-v6') || '[]');
                } catch { return []; }
            });
            const [view, setView] = useState('home');
            const [selId, setSelId] = useState(null);
            const [edit, setEdit] = useState(null);
            const [img, setImg] = useState("");
            const [cat, setCat] = useState("すべて");
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                try { localStorage.setItem('oshi-v6', JSON.stringify(animes)); } catch (e) {
                    alert("容量がいっぱいです！不要な画像を消してください。");
                }
            }, [animes]);

            // 画像を極限まで小さく圧縮する魔法
            const hImg = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                const reader = new FileReader();
                reader.onload = (event) => {
                    const imgObj = new Image();
                    imgObj.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; // 横幅最大400pxに制限
                        let width = imgObj.width;
                        let height = imgObj.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(imgObj, 0, 0, width, height);
                        setImg(canvas.toDataURL('image/jpeg', 0.6)); // 画質を60%に落として軽量化
                        setLoading(false);
                    };
                    imgObj.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const goHome = () => { setView('home'); setEdit(null); setSelId(null); setImg(""); };

            const sAni = (e) => {
                e.preventDefault();
                const d = new FormData(e.target);
                const obj = { 
                    id: edit ? edit.id : Date.now(),
                    title: d.get('t') || "無題", 
                    memo: d.get('m') || "", 
                    cat: d.get('c') || "未設定", 
                    img: img || edit?.img || "" 
                };
                if (edit) setAnimes(animes.map(a => a.id === edit.id ? { ...a, ...obj } : a));
                else setAnimes([obj, ...animes]);
                goHome();
            };

            const sCha = (e) => {
                e.preventDefault();
                const d = new FormData(e.target);
                const obj = { id: Date.now(), name: d.get('n') || "キャラ名", tag: d.get('g') || "未設定", img: img };
                setAnimes(animes.map(a => a.id === selId ? { ...a, charas: [...(a.charas || []), obj] } : a));
                setImg(""); e.target.reset();
            };

            const mv = (l, i, d) => {
                const n = [...(l || [])];
                if (i+d < 0 || i+d >= n.length) return l;
                [n[i], n[i+d]] = [n[i+d], n[i]];
                return n;
            };

            const allC = animes.flatMap(a => (a.charas || []).map(c => ({ ...c, aT: a.title, aI: a.id })));
            const cats = ["すべて", ...new Set(animes.map(a => a.cat))];

            return (
                <div className="safe-area min-h-screen">
                    <header className="bg-white/80 backdrop-blur-md p-4 sticky top-0 z-50 flex justify-between items-center border-b">
                        <h1 className="font-bold text-orange-800 text-lg" onClick={goHome}>推しログ</h1>
                        <div className="flex gap-2">
                            <button onClick={() => setView('cs')} className="text-[10px] bg-white border px-3 py-2 rounded-full shadow-sm">👤 キャラ別</button>
                            <button onClick={() => {setEdit(null); setView('add');}} className="text-[10px] bg-orange-700 text-white px-3 py-2 rounded-full font-bold">＋ 追加</button>
                        </div>
                    </header>

                    <main className="p-4 max-w-xl mx-auto">
                        {view === 'home' && (
                            <div>
                                <div className="flex gap-2 overflow-x-auto mb-6 no-scrollbar">
                                    {cats.map(c => <button key={c} onClick={() => setCat(c)} className={`px-4 py-1.5 rounded-full text-xs whitespace-nowrap transition-colors ${cat === c ? 'bg-orange-700 text-white' : 'bg-white text-gray-500'}`}>{c}</button>)}
                                </div>
                                <div className="grid gap-4">
                                    {(cat === "すべて" ? animes : animes.filter(a => a.cat === cat)).map((a, i) => (
                                        <div key={a.id} className="card relative active:scale-[0.98] transition-transform">
                                            <div onClick={() => { setSelId(a.id); setView('det'); }}>
                                                {a.img && <img src={a.img} className="w-full h-48 object-cover" />}
                                                <div className="p-4">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className="text-[10px] font-bold text-orange-700 px-2 py-0.5 bg-orange-50 rounded">RANK {i+1}</span>
                                                        <span className="text-[10px] text-gray-400">{a.cat}</span>
                                                    </div>
                                                    <h2 className="font-bold text-lg">{a.title}</h2>
                                                </div>
                                            </div>
                                            <div className="absolute top-2 right-2 flex gap-1">
                                                <button onClick={() => setAnimes(mv(animes, i, -1))} className="bg-white/90 w-8 h-8 rounded-full shadow-sm flex items-center justify-center text-xs">▲</button>
                                                <button onClick={() => setAnimes(mv(animes, i, 1))} className="bg-white/90 w-8 h-8 rounded-full shadow-sm flex items-center justify-center text-xs">▼</button>
                                                <button onClick={() => {setEdit(a); setImg(a.img); setView('add');}} className="bg-white/90 w-8 h-8 rounded-full shadow-sm flex items-center justify-center text-xs">✎</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'cs' && (
                            <div>
                                <h2 className="font-bold mb-6 border-l-4 border-orange-700 pl-3">全キャラまとめ</h2>
                                <div className="grid grid-cols-2 gap-3">
                                    {allC.map(c => (
                                        <div key={c.id} className="card p-4 text-center">
                                            <div className="w-20 h-20 mx-auto rounded-full overflow-hidden mb-3 ring-4 ring-orange-50">{c.img ? <img src={c.img} className="w-full h-full object-cover" /> : <div className="bg-gray-100 h-full flex items-center justify-center">👤</div>}</div>
                                            <div className="text-[9px] font-bold text-orange-600 mb-1">{c.tag}</div>
                                            <div className="font-bold text-sm truncate">{c.name}</div>
                                            <div className="text-[10px] text-gray-400 truncate mt-1">{c.aT}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'det' && (
                            <div>
                                <button onClick={goHome} className="text-sm text-gray-400 mb-4 flex items-center">← 戻る</button>
                                {animes.filter(a => a.id === selId).map(a => (
                                    <div key={a.id}>
                                        <div className="card p-6 mb-8 border-t-4 border-orange-700">
                                            <h2 className="font-bold text-2xl mb-4">{a.title}</h2>
                                            <p className="text-sm text-gray-600 leading-relaxed whitespace-pre-wrap">{a.memo}</p>
                                        </div>
                                        <h3 className="font-bold mb-4 flex items-center gap-2">🏆 推しキャラ順位</h3>
                                        <div className="grid gap-3">
                                            {(a.charas || []).map((c, ci) => (
                                                <div key={c.id} className="card p-3 flex gap-4 items-center relative">
                                                    <div className="w-16 h-16 rounded-xl overflow-hidden bg-gray-50 flex-shrink-0">{c.img ? <img src={c.img} className="w-full h-full object-cover" /> : <div className="flex items-center justify-center h-full">👤</div>}</div>
                                                    <div className="flex-1">
                                                        <div className="text-[9px] font-bold text-orange-700">#{ci+1} / {c.tag}</div>
                                                        <div className="font-bold">{c.name}</div>
                                                    </div>
                                                    <div className="flex flex-col gap-1">
                                                        <button onClick={() => {const nc = mv(a.charas, ci, -1); setAnimes(animes.map(an => an.id === a.id ? {...an, charas: nc} : an))}} className="p-1 text-gray-300">▲</button>
                                                        <button onClick={() => {const nc = mv(a.charas, ci, 1); setAnimes(animes.map(an => an.id === a.id ? {...an, charas: nc} : an))}} className="p-1 text-gray-300">▼</button>
                                                    </div>
                                                    <button onClick={() => {if(confirm("削除しますか？")) setAnimes(animes.map(an => an.id === a.id ? {...an, charas: an.charas.filter(cc => cc.id !== c.id)} : an))} } className="absolute -top-1 -right-1 bg-red-100 text-red-400 w-5 h-5 rounded-full text-xs flex items-center justify-center">×</button>
                                                </div>
                                            ))}
                                        </div>
                                        <form onSubmit={sCha} className="mt-8 card p-6 border-2 border-dashed border-orange-100">
                                            <p className="text-xs font-bold text-center mb-4 text-orange-800">推しキャラを追加</p>
                                            <input name="n" required placeholder="キャラ名" className="w-full mb-3 p-3 bg-gray-50 rounded-xl outline-none text-sm" />
                                            <input name="g" placeholder="カテゴリー（癒やし、クールなど）" className="w-full mb-4 p-3 bg-gray-50 rounded-xl outline-none text-sm" />
                                            <div className="flex justify-between items-center gap-2">
                                                <input type="file" accept="image/*" onChange={hImg} className="text-[10px] overflow-hidden" />
                                                <button disabled={loading} className="bg-orange-700 text-white px-6 py-2 rounded-full text-xs font-bold disabled:bg-gray-400">{loading ? "処理中..." : "追加"}</button>
                                            </div>
                                            {img && <img src={img} className="mt-4 w-16 h-16 object-cover rounded-full mx-auto ring-2 ring-orange-100" />}
                                        </form>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'add' && (
                            <div className="card p-6">
                                <h2 className="font-bold text-xl mb-8 text-center">{edit ? "内容を書き換える" : "新しい作品"}</h2>
                                <form onSubmit={sAni} className="grid gap-6">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-gray-400 ml-1">作品タイトル</label>
                                        <input name="t" defaultValue={edit?.title} required className="w-full p-3 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-orange-200" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-gray-400 ml-1">カテゴリー（2026春、殿堂入りなど）</label>
                                        <input name="c" defaultValue={edit?.cat} className="w-full p-3 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-orange-200" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-gray-400 ml-1">感想・分析メモ</label>
                                        <textarea name="m" defaultValue={edit?.memo} className="w-full p-3 bg-gray-50 rounded-2xl h-32 outline-none border-2 border-transparent focus:border-orange-200 text-sm" />
                                    </div>
                                    <div className="bg-orange-50/50 p-6 rounded-3xl text-center border-2 border-dashed border-orange-100">
                                        <input type="file" accept="image/*" onChange={hImg} className="text-xs w-full" />
                                        {img && <div className="mt-4 relative inline-block">
                                            <img src={img} className="w-full h-44 object-cover rounded-2xl shadow-md" />
                                            <button type="button" onClick={() => setImg("")} className="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs">×</button>
                                        </div>}
                                    </div>
                                    <button disabled={loading} className="bg-orange-700 text-white py-4 rounded-2xl font-bold shadow-lg disabled:bg-gray-400">
                                        {loading ? "画像を圧縮中..." : (edit ? "更新を保存" : "作品を登録する")}
                                    </button>
                                    {edit && <button type="button" onClick={() => {if(confirm("この作品を削除しますか？")){setAnimes(animes.filter(a=>a.id!==edit.id)); goHome();}}} className="text-red-400 text-xs mt-2">この作品を完全に削除</button>}
                                </form>
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
