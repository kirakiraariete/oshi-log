<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推しログ</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('home');

            useEffect(() => {
                fetch('/api/data').then(r => r.json()).then(d => {
                    setItems(d || []);
                    setLoading(false);
                }).catch(() => setLoading(false));
            }, []);

            useEffect(() => {
                if (!loading) {
                    fetch('/api/data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(items)
                    });
                }
            }, [items, loading]);

            const addItem = (e) => {
                e.preventDefault();
                const f = new FormData(e.target);
                const newItem = { id: Date.now(), t: f.get('t'), c: f.get('c'), m: f.get('m') };
                setItems([...items, newItem]);
                setView('home');
            };

            const move = (i, d) => {
                const n = [...items];
                if (i+d >= 0 && i+d < n.length) {
                    [n[i], n[i+d]] = [n[i+d], n[i]];
                    setItems(n);
                }
            };

            if (loading) return <div className="p-10 text-center">読み込み中...</div>;

            return (
                <div className="max-w-md mx-auto p-4">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-xl font-bold" onClick={() => setView('home')}>推しログ</h1>
                        <button onClick={() => setView('add')} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">追加</button>
                    </div>

                    {view === 'home' && (
                        <div className="space-y-3">
                            {items.length === 0 && <p className="text-gray-400 text-center py-10">データがありません</p>}
                            {items.map((item, i) => (
                                <div key={item.id} className="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border">
                                    <div>
                                        <div className="text-xs text-blue-500 font-bold">{item.c}</div>
                                        <div className="font-bold">{item.t}</div>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => move(i, -1)} className="text-gray-300">▲</button>
                                        <button onClick={() => move(i, 1)} className="text-gray-300">▼</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'add' && (
                        <form onSubmit={addItem} className="space-y-4">
                            <input name="t" required placeholder="タイトル" className="w-full p-3 border rounded-lg" />
                            <input name="c" placeholder="カテゴリ" className="w-full p-3 border rounded-lg" />
                            <textarea name="m" placeholder="メモ" className="w-full p-3 border rounded-lg h-32" />
                            <button className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">保存</button>
                            <button type="button" onClick={() => setView('home')} className="w-full text-gray-400">戻る</button>
                        </form>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
