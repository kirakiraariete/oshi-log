<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推しログ 永久保存版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('home');
            const [activeId, setActiveId] = useState(null);

            // 1. 読み込み（サイトを開いた時）
            useEffect(() => {
                fetch('/api/data')
                    .then(r => r.json())
                    .then(d => {
                        setData(d || []);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            // 2. 保存（データが変わった時、自動で金庫へ）
            useEffect(() => {
                if (!loading) {
                    const saveData = async () => {
                        try {
                            await fetch('/api/data', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(data)
                            });
                        } catch (e) {
                            console.error("保存失敗", e);
                        }
                    };
                    saveData();
                }
            }, [data, loading]);

            const move = (list, i, d) => {
                const n = [...list];
                if (i+d >= 0 && i+d < n.length) [n[i], n[i+d]] = [n[i+d], n[i]];
                return n;
            };

            const current = data.find(i => i.id === activeId);

            if (loading) return <div class="p-10 text-center font-bold">データを読み込み中...</div>;

            return (
                <div class="max-w-md mx-auto p-4 min-h-screen">
                    <header class="flex justify-between items-center mb-6 border-b pb-4">
                        <h1 class="text-xl font-bold" onClick={() => setView('home')}>推しログ</h1>
                        <button onClick={() => setView('add')} class="bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold">＋追加</button>
                    </header>

                    {view === 'home' && (
                        <div class="space-y-3">
                            {data.length === 0 && <p class="text-center text-gray-400 py-20">まだ登録がありません</p>}
                            {data.map((item, i) => (
                                <div key={item.id} class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border">
                                    <div onClick={() => {setActiveId(item.id); setView('det');}} class="flex-1">
                                        <div class="text-[10px] text-blue-500 font-bold uppercase">{item.c || 'カテゴリなし'}</div>
                                        <div class="font-bold">#{i+1} {item.t}</div>
                                    </div>
                                    <div class="flex gap-4">
                                        <button onClick={() => setData(move(data, i, -1))} class="text-gray-300 px-2">▲</button>
                                        <button onClick={() => setData(move(data, i, 1))} class="text-gray-300 px-2">▼</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'det' && current && (
                        <div>
                            <button onClick={() => setView('home')} class="mb-4 text-xs font-bold text-gray-400">← 戻る</button>
                            <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
                                <h2 class="text-2xl font-bold mb-2">{current.t}</h2>
                                <p class="text-sm text-gray-500 whitespace-pre-line">{current.m}</p>
                            </div>
                            
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-sm font-bold">キャラクター順位</h3>
                            </div>
                            <div class="space-y-2">
                                {(current.chars || []).map((ch, ci) => (
                                    <div key={ch.id} class="bg-white p-3 flex justify-between rounded-lg border items-center">
                                        <div class="font-bold text-sm">#{ci+1} {ch.name}</div>
                                        <div class="flex gap-4">
                                            <button onClick={() => {
                                                const nc = move(current.chars, ci, -1);
                                                setData(data.map(d => d.id === current.id ? {...d, chars: nc} : d));
                                            }} class="text-gray-300">▲</button>
                                            <button onClick={() => {
                                                const nc = move(current.chars, ci, 1);
                                                setData(data.map(d => d.id === current.id ? {...d, chars: nc} : d));
                                            }} class="text-gray-300">▼</button>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const n = new FormData(e.target).get('n');
                                if(!n) return;
                                const nch = { id: Date.now(), name: n };
                                setData(data.map(d => d.id === current.id ? {...d, chars: [...(d.chars||[]), nch]} : d));
                                e.target.reset();
                            }} class="mt-8 pt-6 border-t">
                                <input name="n" required placeholder="追加したいキャラ名" class="w-full p-3 rounded-lg border mb-2 text-sm outline-none bg-white" />
                                <button class="w-full bg-gray-800 text-white py-3 rounded-lg text-xs font-bold shadow">この作品にキャラを追加</button>
                            </form>
                        </div>
                    )}

                    {view === 'add' && (
                        <form onSubmit={(e) => {
                            e.preventDefault();
                            const fd = new FormData(e.target);
                            const newItem = { id: Date.now(), t: fd.get('t'), c: fd.get('c'), m: fd.get('m'), chars: [] };
                            setData([...data, newItem]);
                            setView('home');
                        }} class="space-y-4">
                            <h2 class="text-lg font-bold text-center">新規作品登録</h2>
                            <input name="t" required placeholder="作品のタイトル" class="w-full p-4 rounded-xl border outline-none font-bold shadow-sm" />
                            <input name="c" placeholder="カテゴリ（アニメ、漫画など）" class="w-full p-4 rounded-xl border outline-none text-sm shadow-sm" />
                            <textarea name="m" placeholder="今の感想や記録" class="w-full p-4 rounded-xl border outline-none h-40 text-sm shadow-sm" />
                            <button class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">クラウドに保存する</button>
                            <button type="button" onClick={() => setView('home')} class="w-full text-gray-400 text-xs py-2">戻る</button>
                        </form>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
